name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Type-check
        run: npx tsc -p tsconfig.build.json --noEmit

      - name: Run tests
        run: npm test
        env:
          TWITCH_CLIENT_ID: ci-client-id
          TWITCH_CLIENT_SECRET: ci-client-secret

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t twitch-analytics-ci .

      - name: Boot container against SQLite (default production path)
        run: |
          docker run -d --name twitch-analytics-ci \
            -e TWITCH_CLIENT_ID=ci-client-id \
            -e TWITCH_CLIENT_SECRET=ci-client-secret \
            -p 3000:3000 \
            twitch-analytics-ci

      - name: Smoke test the running container
        run: |
          success=false
          for i in $(seq 1 15); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/analytics/streams || echo "000")
            if [ "$status" = "401" ]; then
              echo "Container booted and responded 401 as expected"
              success=true
              break
            fi
            sleep 1
          done

          if [ "$success" != "true" ]; then
            echo "Container did not respond as expected within 15s"
            exit 1
          fi

      - name: Dump container logs
        if: always()
        run: docker logs twitch-analytics-ci || true

  deploy:
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to alwaysdata over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ssh-javieribarra540.alwaysdata.net
          username: javieribarra540
          key: ${{ secrets.ALWAYSDATA_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/Twitch-Analytics-540
            git checkout main
            git pull origin main
            JOBS=1 npm install --no-audit --no-fund
            npm run build
            # TODO: confirm this is actually how the running process gets restarted
            # on this alwaysdata site (panel-managed app, touch-file convention,
            # pm2, etc.) — see PR description for context.
            touch tmp/restart.txt || true

      - name: Verify the deployed server responds
        run: |
          sleep 5
          status=$(curl -s -o /dev/null -w "%{http_code}" https://javieribarra540.alwaysdata.net/analytics/streams || echo "000")
          echo "Production responded with status $status"
          if [ "$status" != "401" ]; then
            echo "::warning::Production did not respond with the expected 401 after deploy — verify manually."
          fi
